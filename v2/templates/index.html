<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로컬 리걸 RAG - 전문 법률 AI 비서</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --user-msg: #3b82f6;
            --assistant-msg: #334155;
            --danger: #ef4444;
            --border-color: #475569;
            --card-bg: #1e293b;
            --font-stack: 'Inter', 'Noto Sans KR', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--chat-bg);
            padding: 1.2rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #38bdf8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        header h1::before {
            content: "⚖️";
        }

        .header-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #0f172a;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            border: 1px solid var(--border-color);
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            height: calc(100vh - 70px);
        }

        .chat-area {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        /* Scrollbar styles */
        .chat-area::-webkit-scrollbar {
            width: 8px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .message-row {
            display: flex;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            line-height: 1.6;
            font-size: 0.95rem;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .message-row.user .message-bubble {
            background-color: var(--primary);
            color: #ffffff;
            border-bottom-right-radius: 0.25rem;
        }

        .message-row.assistant .message-bubble {
            background-color: var(--assistant-msg);
            color: var(--text-color);
            border-bottom-left-radius: 0.25rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .system-blocked {
            border: 1px solid var(--danger) !important;
            background-color: rgba(239, 68, 68, 0.1) !important;
            color: #fca5a5 !important;
        }

        .sources-container {
            margin-top: 0.75rem;
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sources-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .source-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .source-card:hover {
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.8);
        }

        .source-header {
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            color: #e2e8f0;
        }

        .source-body {
            display: none;
            margin-top: 0.4rem;
            color: var(--text-muted);
            font-size: 0.78rem;
            line-height: 1.4;
            border-top: 1px dashed var(--border-color);
            padding-top: 0.4rem;
        }

        .source-card.active .source-body {
            display: block;
        }

        .input-area {
            padding: 1.5rem;
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
        }

        .input-form {
            display: flex;
            gap: 0.75rem;
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 0.5rem 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .input-form:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .input-form textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            resize: none;
            height: 40px;
            font-family: var(--font-stack);
            font-size: 0.95rem;
            outline: none;
            padding: 0.5rem 0;
            line-height: 1.4;
        }

        .input-form button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            font-family: var(--font-stack);
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-end;
        }

        .input-form button:hover {
            background-color: var(--primary-hover);
        }

        .input-form button:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 24px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background-color: var(--text-muted);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .intro-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
            color: var(--text-muted);
            gap: 1rem;
            padding: 2rem;
        }

        .intro-logo {
            font-size: 3rem;
        }

        .intro-title {
            color: var(--text-color);
            font-weight: 600;
            font-size: 1.5rem;
        }

        .intro-desc {
            max-width: 450px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .guardrail-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        .guardrail-tag.pass {
            background-color: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        .guardrail-tag.block {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
    </style>
</head>
<body>

    <header>
        <h1>로컬 리걸 RAG 시스템</h1>
        <div class="header-subtitle">완전 오프라인 보안 모드</div>
    </header>

    <div class="main-container">
        <div class="chat-area" id="chatArea">
            <div class="intro-container" id="introContainer">
                <div class="intro-logo">⚖️</div>
                <div class="intro-title">대한민국 법률 AI 비서</div>
                <div class="intro-desc">
                    본 시스템은 완전 로컬 인프라에서 작동하며 유저의 질문 정보가 외부로 유출되지 않습니다.<br>
                    형사법/공법 데이터베이스 및 이중 가드레일이 탑재되어 안전하고 정확한 근거 출처 답변을 지원합니다.
                </div>
            </div>
        </div>

        <div class="input-area">
            <form class="input-form" id="inputForm">
                <textarea id="userInput" placeholder="사건번호나 법률적 쟁점을 질문해보세요... (예: 기소유예처분 취소 청구 조건)"></textarea>
                <button type="submit" id="sendBtn">전송</button>
            </form>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const introContainer = document.getElementById('introContainer');
        const userInput = document.getElementById('userInput');
        const inputForm = document.getElementById('inputForm');
        const sendBtn = document.getElementById('sendBtn');

        // Handle auto resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = '40px';
            this.style.height = (this.scrollHeight - 10) + 'px';
        });

        // Submit form
        inputForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Hide intro on first message
            if (introContainer) {
                introContainer.remove();
            }

            // Append user message
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = '40px';
            userInput.focus();

            // Append assistant loading dots
            const loadingId = appendLoadingBubble();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });

                const data = await response.json();
                removeLoadingBubble(loadingId);

                // Check guardrail statuses
                const is_legal = data.is_legal_intent;
                const was_blocked = data.blocked_by_guardrail;

                appendMessage('assistant', data.answer, data.sources, is_legal, was_blocked);

            } catch (error) {
                console.error(error);
                removeLoadingBubble(loadingId);
                appendMessage('assistant', '서버 통신 오류가 발생했습니다. 로컬 Ollama와 백엔드 서버 상태를 확인해주세요.', [], true, true);
            }
        });

        function appendMessage(sender, text, sources = [], isLegal = true, wasBlocked = false) {
            const row = document.createElement('div');
            row.classList.add('message-row', sender);

            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble');

            // Format message bubble style based on guardrail block
            if (wasBlocked) {
                bubble.classList.add('system-blocked');
            }

            let headerHTML = '';
            if (sender === 'assistant') {
                const intentTag = isLegal 
                    ? '<span class="guardrail-tag pass">법률질문 판정</span>'
                    : '<span class="guardrail-tag block">일반질문 차단</span>';
                const statusTag = wasBlocked 
                    ? '<span class="guardrail-tag block">가드레일 차단</span>'
                    : '<span class="guardrail-tag pass">가드레일 통과</span>';
                headerHTML = `<div style="margin-bottom: 0.5rem; display: flex; gap: 0.25rem;">${intentTag} ${statusTag}</div>`;
            }

            bubble.innerHTML = `${headerHTML}<div style="white-space: pre-wrap;">${text}</div>`;

            // Append citations if exist
            if (sources && sources.length > 0) {
                const sourcesContainer = document.createElement('div');
                sourcesContainer.classList.add('sources-container');
                sourcesContainer.innerHTML = '<div class="sources-title">참조 근거 출처</div>';

                sources.forEach(src => {
                    const card = document.createElement('div');
                    card.classList.add('source-card');
                    card.innerHTML = `
                        <div class="source-header">
                            <span>[출처 ${src.index}] ${src.title}</span>
                            <span>자세히 보기</span>
                        </div>
                        <div class="source-body">${src.snippet}</div>
                    `;
                    card.addEventListener('click', () => {
                        card.classList.toggle('active');
                        const arrow = card.querySelector('.source-header span:last-child');
                        arrow.innerText = card.classList.contains('active') ? '접기' : '자세히 보기';
                    });
                    sourcesContainer.appendChild(card);
                });
                bubble.appendChild(sourcesContainer);
            }

            row.appendChild(bubble);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function appendLoadingBubble() {
            const id = 'loading_' + Date.now();
            const row = document.createElement('div');
            row.classList.add('message-row', 'assistant');
            row.id = id;

            const bubble = document.createElement('div');
            bubble.classList.add('message-bubble');
            bubble.innerHTML = `
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;

            row.appendChild(bubble);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
            return id;
        }

        function removeLoadingBubble(id) {
            const bubble = document.getElementById(id);
            if (bubble) bubble.remove();
        }

        // Send with Enter key, new line with Shift+Enter
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
